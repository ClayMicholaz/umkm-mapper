services:
  - type: web
    name: umkm-mapper-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: MONGODB_URI
        scope: run
        value: # Add your MongoDB Atlas connection string
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CORS_ORIGIN
        value: https://your-vercel-domain.vercel.app
